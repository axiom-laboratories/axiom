
version: "3"
services:
  node:
    image: localhost/master-of-puppets-node:latest
    privileged: true
    environment:
      - NODE_TAGS=general,linux,test-group
      - JOB_IMAGE=docker.io/library/python:3.12-alpine
      - AGENT_URL=https://puppeteer-agent-1:8001
      - JOIN_
      - ROOT_CA_PATH=/app/secrets/root_ca.crt
      - PYTHONUNBUFFERED=1
    # volumes:
    #   - vol_test_local:/mnt/c/Development/Repos/master_of_puppets/test_mount
    restart: always
    networks:
      - puppeteer_default

  sidecar:
    image: localhost/mop-sidecar-proxy:v1
    network_mode: service:node
    restart: always

networks:
  puppeteer_default:
    external: true

