version: '3'

networks:
  puppeteer_default:
    external: true
  jobs_network:
    driver: bridge

services:
  node:
    build:
      context: .
      dockerfile: Containerfile.node
    image: localhost/master-of-puppets-node:latest
    restart: always

    # Security: remove privileged mode, use capability restrictions (Phase 134)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # Socket access: group_add grants docker group membership for socket access
    group_add:
      - "999"  # GID 999 is the docker group default — verify on your host with: getent group docker

    # Volumes: secrets + docker socket for job execution
    volumes:
      - ./secrets:/app/secrets
      - /var/run/docker.sock:/var/run/docker.sock:rw

    networks:
      - puppeteer_default
      - jobs_network

    environment:
      - NODE_TAGS=general,linux,test-group
      - JOB_IMAGE=docker.io/library/python:3.12-alpine
      - AGENT_URL=https://puppeteer-agent-1:8001
      - JOIN_TOKEN=${JOIN_TOKEN}
      - ROOT_CA_PATH=/app/secrets/root_ca.crt
      - PYTHONUNBUFFERED=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - EXECUTION_MODE=auto

  sidecar:
    image: localhost/mop-sidecar-proxy:v1
    restart: always
    network_mode: service:node  # Shares node's network namespace
