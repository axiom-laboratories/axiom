version: "3"

# Node Podman — Podman-based test node for dual-runtime validation
# Tests resource limit enforcement on Podman (vs Docker)
# Mounts Docker socket for Podman-in-Docker nested container execution

services:
  puppet-podman:
    image: localhost/master-of-puppets-node:latest
    container_name: puppet-podman
    hostname: puppet-podman
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:172.17.0.1"
    environment:
      - AGENT_URL=https://puppeteer-agent-1:8001
      - VERIFY_SSL=false
      - API_KEY=master-secret-key
      - NODE_TAGS=podman-test,validation
      - JOIN_TOKEN=${JOIN_TOKEN_PODMAN}
      - ENV_TAG=VALIDATION
      - EXECUTION_MODE=podman
      - JOB_IMAGE=docker.io/library/python:3.12-slim
      - HEARTBEAT_INTERVAL=5
      - REGISTRATION_TIMEOUT=30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - podman_secrets:/app/secrets
    privileged: true
    networks:
      - puppeteer_default

volumes:
  podman_secrets:

networks:
  puppeteer_default:
    external: true
