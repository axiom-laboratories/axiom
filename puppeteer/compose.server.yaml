version: "3"

services:
  db:
    image: docker.io/library/postgres:15-alpine
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETFCAP
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: puppet
      POSTGRES_PASSWORD: masterpassword
      POSTGRES_DB: puppet_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U puppet -d puppet_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  cert-manager:
    image: localhost/app_cert-manager:v3
    build:
      context: ./cert-manager
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "8443:443"
      # Expose internal API port if needed, or keep internal only
    volumes:
      - certs-volume:/etc/certs
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SERVER_HOSTNAME=${SERVER_HOSTNAME:-}
    restart: always

  agent:
    build:
      context: .
      dockerfile: Containerfile.server
    image: localhost/master-of-puppets-server:v3
    command: python -m agent_service.main
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-puppet}:${POSTGRES_PASSWORD:-masterpassword}@db/${POSTGRES_DB:-puppet_db}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PYTHONUNBUFFERED=1
      - AGENT_URL=${AGENT_URL:-https://localhost:8001}
      - NODE_IMAGE=${NODE_IMAGE:-localhost/master-of-puppets-node:latest}
      - NODE_EXECUTION_MODE=${NODE_EXECUTION_MODE:-auto}
      - AXIOM_LICENCE_KEY=${AXIOM_LICENCE_KEY:-}
      - ASYNCPG_POOL_SIZE=${ASYNCPG_POOL_SIZE:-20}
      - ALLOW_CONTAINER_MANAGEMENT=${ALLOW_CONTAINER_MANAGEMENT:-false}
    ports:
      - "8001:8001"
    volumes:
      # Note: If you add agent volumes here, update compose.ee.yaml as well
      - certs-volume:/app/global_certs:ro # Read-only access to Caddy's certs
      - /var/run/docker.sock:/var/run/docker.sock # Mount Docker socket for Foundry builds
      - ../puppets:/app/puppets:ro # Mount puppets context for builds
      - secrets-data:/app/secrets   # Persists boot.log and licence.key across restarts
                                    # Seed licence: docker cp licence.key <agent-container>:/app/secrets/
    depends_on:
      db:
        condition: service_healthy
      cert-manager:
        condition: service_started

  model:
    build:
      context: .
      dockerfile: Containerfile.server
    image: localhost/master-of-puppets-model:v3
    command: uvicorn model_service.main:app --host 0.0.0.0 --port 8000
    restart: always
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-puppet}:${POSTGRES_PASSWORD:-masterpassword}@db/${POSTGRES_DB:-puppet_db}
      - AGENT_URL=https://agent:8001 # Uses Internal HTTPS
      - API_KEY=${API_KEY:-changeme} # Required for legacy API key auth
      - ROOT_CA_PATH=ca/certs/root_ca.crt
    # No volumes needed, baked into image
    depends_on:
      db:
        condition: service_healthy
      agent:
        condition: service_started

  dashboard:
    image: localhost/master-of-puppets-dashboard:v3
    build:
      context: ./dashboard
      dockerfile: Containerfile
    # Ports removed: Caddy proxies 80/443
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETFCAP
      - SETGID
    security_opt:
      - no-new-privileges:true
    restart: always

  docs:
    image: localhost/master-of-puppets-docs:v1
    build:
      context: ..
      dockerfile: docs/Dockerfile
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETFCAP
      - SETGID
    security_opt:
      - no-new-privileges:true
    restart: always

  registry:
    image: registry:2
    restart: always
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry

volumes:
  pgdata:
  certs-volume:
  caddy_data:
  caddy_config:
  registry-data:
  secrets-data:   # Agent secrets persistence (boot.log, licence.key)
