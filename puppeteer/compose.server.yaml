version: "3"

services:
  db:
    image: docker.io/library/postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: puppet
      POSTGRES_PASSWORD: masterpassword
      POSTGRES_DB: puppet_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U puppet -d puppet_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  agent:
    image: localhost/master-of-puppets-server:latest
    command: python -m agent_service.main
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-puppet}:${POSTGRES_PASSWORD:-masterpassword}@db/${POSTGRES_DB:-puppet_db}
      - API_KEY=${API_KEY:-master-secret-key}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    ports:
      - "8001:8001"
    volumes:
      - ./ca:/app/ca
      - ./secrets:/app/secrets
    depends_on:
      db:
        condition: service_healthy

  model:
    image: localhost/master-of-puppets-server:latest
    command: uvicorn model_service.main:app --host 0.0.0.0 --port 8000 --ssl-keyfile secrets/key.pem --ssl-certfile secrets/cert.pem
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-puppet}:${POSTGRES_PASSWORD:-masterpassword}@db/${POSTGRES_DB:-puppet_db}
      - AGENT_URL=https://agent:8001
      - ROOT_CA_PATH=ca/certs/root_ca.crt
      - API_KEY=${API_KEY:-master-secret-key}
    volumes:
      - ./ca:/app/ca
      - ./secrets:/app/secrets
    depends_on:
      db:
        condition: service_healthy
      agent:
        condition: service_started

  dashboard:
    image: localhost/master-of-puppets-dashboard:latest
    build:
      context: ./dashboard
      dockerfile: Containerfile
    ports:
      - "5173:80"
    restart: always

volumes:
  pgdata:
