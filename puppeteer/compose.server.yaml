version: "3"

services:
  db:
    image: docker.io/library/postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: puppet
      POSTGRES_PASSWORD: masterpassword
      POSTGRES_DB: puppet_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U puppet -d puppet_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  cert-manager:
    image: localhost/app_cert-manager:v3
    build:
      context: ./cert-manager
    ports:
      - "8080:80"
      - "8443:443"
      # Expose internal API port if needed, or keep internal only
    volumes:
      - certs-volume:/etc/certs
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
      - DUCKDNS_DOMAIN=${DUCKDNS_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    restart: always

  ddns-updater:
    image: docker.io/favonia/cloudflare-ddns:latest
    # For DuckDNS, likely want a different image or specific script, but scaffolding here:
    environment:
      - IP6_PROVIDER=none
      - IP4_PROVIDER=local
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN} # If supported by image, otherwise need different image
      # Favonia is CF specific. Let's use a generic placeholder or assume user swaps image based on provider.
      # For now, sticking to the architectural plan's structure.
    restart: always

  agent:
    build:
      context: .
      dockerfile: Containerfile.server
    image: localhost/master-of-puppets-server:v3
    command: python -m agent_service.main
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-puppet}:${POSTGRES_PASSWORD:-masterpassword}@db/${POSTGRES_DB:-puppet_db}
      - API_KEY=${API_KEY:-master-secret-key}
      - ADMIN_PASSWORD=admin123
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PYTHONUNBUFFERED=1
    ports:
      - "8001:8001"
    volumes:
      - certs-volume:/app/global_certs:ro # Read-only access to Caddy's certs
    depends_on:
      db:
        condition: service_healthy
      cert-manager:
        condition: service_started

  model:
    build:
      context: .
      dockerfile: Containerfile.server
    image: localhost/master-of-puppets-server:v3
    command: uvicorn model_service.main:app --host 0.0.0.0 --port 8000
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-puppet}:${POSTGRES_PASSWORD:-masterpassword}@db/${POSTGRES_DB:-puppet_db}
      - AGENT_URL=https://agent:8001 # Uses Internal HTTPS
      - ROOT_CA_PATH=ca/certs/root_ca.crt
      - API_KEY=${API_KEY:-master-secret-key}
    # No volumes needed, baked into image
    depends_on:
      db:
        condition: service_healthy
      agent:
        condition: service_started

  dashboard:
    image: localhost/master-of-puppets-dashboard:v3
    build:
      context: ./dashboard
      dockerfile: Containerfile
    # Ports removed: Caddy proxies 80/443
    restart: always

volumes:
  pgdata:
  certs-volume:
  caddy_data:
  caddy_config:
