version: "3"

services:
  db:
    image: docker.io/library/postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: puppet
      POSTGRES_PASSWORD: masterpassword
      POSTGRES_DB: puppet_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U puppet -d puppet_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  cert-manager:
    image: localhost/app_cert-manager:v3
    build:
      context: ./cert-manager
    ports:
      - "80:80"
      - "8443:443"
      # Expose internal API port if needed, or keep internal only
    volumes:
      - certs-volume:/etc/certs
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
      - DUCKDNS_DOMAIN=${DUCKDNS_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
      # Set SERVER_HOSTNAME to your host's IP or FQDN so it's included as a SAN
      # in the Caddy TLS cert. Clients accessing via this address will trust HTTPS.
      # Example: SERVER_HOSTNAME=192.168.1.50 or SERVER_HOSTNAME=puppetmaster.local
      - SERVER_HOSTNAME=${SERVER_HOSTNAME:-}
    restart: always

  ddns-updater:
    image: docker.io/favonia/cloudflare-ddns:latest
    # For DuckDNS, likely want a different image or specific script, but scaffolding here:
    environment:
      - IP6_PROVIDER=none
      - IP4_PROVIDER=local
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN} # If supported by image, otherwise need different image
      # Favonia is CF specific. Let's use a generic placeholder or assume user swaps image based on provider.
      # For now, sticking to the architectural plan's structure.
    restart: always

  agent:
    build:
      context: .
      dockerfile: Containerfile.server
    image: localhost/master-of-puppets-server:v3
    command: python -m agent_service.main
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-puppet}:${POSTGRES_PASSWORD:-masterpassword}@db/${POSTGRES_DB:-puppet_db}
      - API_KEY=${API_KEY:-master-secret-key}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PYTHONUNBUFFERED=1
      - AGENT_URL=${AGENT_URL:-https://localhost:8001}
      - NODE_IMAGE=${NODE_IMAGE:-localhost/master-of-puppets-node:latest}
      - NODE_EXECUTION_MODE=${NODE_EXECUTION_MODE:-auto}
      - MIRROR_DATA_PATH=/app/mirror_data
    ports:
      - "8001:8001"
    volumes:
      - certs-volume:/app/global_certs:ro # Read-only access to Caddy's certs
      - /var/run/docker.sock:/var/run/docker.sock # Mount Docker socket for Foundry builds
      - ../puppets:/app/puppets:ro # Mount puppets context for builds
      - mirror-data:/app/mirror_data # Shared volume for PyPI and APT mirrors
    depends_on:
      db:
        condition: service_healthy
      cert-manager:
        condition: service_started

  pypi:
    image: pypiserver/pypiserver:latest
    restart: always
    command: -P . -a . /data/packages
    volumes:
      - mirror-data:/data/packages
    ports:
      - "8080:8080"

  mirror:
    image: caddy:latest
    restart: always
    volumes:
      - mirror-data:/data
      - ./mirror/Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      - "8081:80"

  model:
    build:
      context: .
      dockerfile: Containerfile.server
    image: localhost/master-of-puppets-model:v3
    command: uvicorn model_service.main:app --host 0.0.0.0 --port 8000
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-puppet}:${POSTGRES_PASSWORD:-masterpassword}@db/${POSTGRES_DB:-puppet_db}
      - AGENT_URL=https://agent:8001 # Uses Internal HTTPS
      - ROOT_CA_PATH=ca/certs/root_ca.crt
      - API_KEY=${API_KEY:-master-secret-key}
    # No volumes needed, baked into image
    depends_on:
      db:
        condition: service_healthy
      agent:
        condition: service_started

  dashboard:
    image: localhost/master-of-puppets-dashboard:v3
    build:
      context: ./dashboard
      dockerfile: Containerfile
    # Ports removed: Caddy proxies 80/443
    restart: always

  docs:
    image: localhost/master-of-puppets-docs:v1
    build:
      context: ..
      dockerfile: docs/Dockerfile
    restart: always

  registry:
    image: registry:2
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - cert-manager

volumes:
  pgdata:
  certs-volume:
  caddy_data:
  caddy_config:
  registry-data:
  mirror-data:
