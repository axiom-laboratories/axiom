version: "3.8"

services:
  agent:
    # Override the volumes block — compose merges this with compose.server.yaml,
    # replacing the entire volumes list (not appending).
    # Important: Keep this in sync with compose.server.yaml agent.volumes
    volumes:
      - certs-volume:/app/global_certs:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ../puppets:/app/puppets:ro
      - mirror-data:/app/mirror_data
      - secrets-data:/app/secrets
    environment:
      - MIRROR_DATA_PATH=/app/mirror_data

  pypi:
    image: pypiserver/pypiserver:latest
    restart: always
    command: -P . -a . /data/packages
    volumes:
      - mirror-data:/data/packages
    ports:
      - "8080:8080"
    profiles:
      - mirrors

  verdaccio:
    image: verdaccio/verdaccio:latest
    restart: always
    volumes:
      - verdaccio-data:/verdaccio/storage
    ports:
      - "4873:4873"
    environment:
      - VERDACCIO_PORT=4873
    profiles:
      - mirrors

  bagetter:
    image: bagetter/bagetter:latest
    restart: always
    ports:
      - "5555:80"
    volumes:
      - bagetter-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BaGetter_ApiKeyAuthenticationOptions__ApiKey=
    profiles:
      - mirrors

  oci-cache-hub:
    image: registry:v2
    restart: always
    ports:
      - "5001:5000"
    volumes:
      - oci-cache-hub-data:/var/lib/registry
    environment:
      - REGISTRY_PROXY_REMOTEURL=https://registry-1.docker.io
    profiles:
      - mirrors

  oci-cache-ghcr:
    image: registry:v2
    restart: always
    ports:
      - "5002:5000"
    volumes:
      - oci-cache-ghcr-data:/var/lib/registry
    environment:
      - REGISTRY_PROXY_REMOTEURL=https://ghcr.io
    profiles:
      - mirrors

  mirror:
    image: caddy:latest
    restart: always
    volumes:
      - ./mirror/Caddyfile:/etc/caddy/Caddyfile
      - mirror-data:/data
    ports:
      - "8081:80"
    profiles:
      - mirrors

volumes:
  mirror-data:
  verdaccio-data:
  bagetter-data:
  oci-cache-hub-data:
  oci-cache-ghcr-data:
