version: "3"

# compose.cold-start.yaml — Axiom CE/EE evaluation stack
#
# A stripped-down version of compose.server.yaml for cold-start evaluation.
# No external service credentials required (no Cloudflare tunnel, DuckDNS, or registry).
#
# Quick start:
#   1. docker compose -f compose.cold-start.yaml up -d
#      Default login: admin / admin  (you will be prompted to change it on first login)
#      Optional: set ADMIN_PASSWORD env var or .env file to override the default.
#
# Usage:
#   CE run:  docker compose -f compose.cold-start.yaml up -d
#   EE run:  AXIOM_LICENCE_KEY=<your_key> docker compose -f compose.cold-start.yaml up -d
#
#   Optional: create a .env file alongside compose.cold-start.yaml to override defaults.
#   Docker Compose v2 reads .env automatically — no --env-file flag needed.
#
# No .env file required. Default credentials: admin / admin
# You will be prompted to change the password on first login.
#
# Dashboard is reachable at: https://localhost:8443
# API is reachable at:       https://localhost:8001

services:
  db:
    image: docker.io/library/postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: puppet
      POSTGRES_PASSWORD: masterpassword
      POSTGRES_DB: puppet_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U puppet -d puppet_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  cert-manager:
    image: ghcr.io/axiom-laboratories/axiom-cert-manager:latest
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - certs-volume:/etc/certs
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - SERVER_HOSTNAME=172.17.0.1
    restart: always

  agent:
    image: ghcr.io/axiom-laboratories/axiom:latest
    command: python -m agent_service.main
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-puppet}:${POSTGRES_PASSWORD:-masterpassword}@db/${POSTGRES_DB:-puppet_db}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PYTHONUNBUFFERED=1
      - AGENT_URL=${AGENT_URL:-https://localhost:8001}
      - NODE_IMAGE=${NODE_IMAGE:-ghcr.io/axiom-laboratories/axiom-node:latest}
      - NODE_EXECUTION_MODE=${NODE_EXECUTION_MODE:-auto}
      - AXIOM_LICENCE_KEY=${AXIOM_LICENCE_KEY:-}
    ports:
      - "8001:8001"
    volumes:
      - certs-volume:/app/global_certs:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - secrets-data:/app/secrets   # Persists boot.log and licence.key across restarts
                                    # EE: Seed licence: docker cp licence.key <agent-container>:/app/secrets/
    depends_on:
      db:
        condition: service_healthy
      cert-manager:
        condition: service_started

  dashboard:
    image: ghcr.io/axiom-laboratories/axiom-dashboard:latest
    restart: always

  docs:
    image: ghcr.io/axiom-laboratories/axiom-docs:latest
    restart: always


volumes:
  pgdata:
  certs-volume:
  caddy_data:
  caddy_config:
  secrets-data:   # Agent secrets persistence (boot.log, licence.key)

networks:
  default:
    name: axiom_default   # Stable name so node compose files can attach with networks.axiom_default.external: true
