name: gh-pages-deploy

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'homepage/**'
      - '.github/workflows/gh-pages-deploy.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: ~/.cache
          restore-keys: |
            mkdocs-material-

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build docs
        working-directory: docs
        run: mkdocs build

      - name: Deploy docs to gh-pages/docs/
        working-directory: docs
        run: ghp-import -n -p -f -x docs site

      - name: Deploy homepage to gh-pages root
        run: |
          cp homepage/index.html /tmp/homepage-index.html
          cp homepage/style.css /tmp/homepage-style.css
          cp -r homepage/assets /tmp/homepage-assets
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/homepage-index.html index.html
          cp /tmp/homepage-style.css style.css
          cp -r /tmp/homepage-assets assets
          touch .nojekyll
          git add index.html style.css assets/ .nojekyll
          git diff --cached --quiet || git commit -m "Deploy homepage and docs from ${{ github.sha }}"
          git push origin gh-pages
