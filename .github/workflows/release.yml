name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    needs: [build-python]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/axiom-agent-sdk
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    needs: [publish-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/axiom-agent-sdk
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docker-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (agent)
        id: meta-agent
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/axiom-laboratories/axiom
          flavor: |
            latest=auto
          tags: |
            type=ref,event=tag

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: puppeteer
          file: puppeteer/Containerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (cert-manager)
        id: meta-cert-manager
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/axiom-laboratories/axiom-cert-manager
          flavor: |
            latest=auto
          tags: |
            type=ref,event=tag

      - name: Build and push cert-manager image
        uses: docker/build-push-action@v6
        with:
          context: puppeteer/cert-manager
          file: puppeteer/cert-manager/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-cert-manager.outputs.tags }}
          labels: ${{ steps.meta-cert-manager.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (dashboard)
        id: meta-dashboard
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/axiom-laboratories/axiom-dashboard
          flavor: |
            latest=auto
          tags: |
            type=ref,event=tag

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: puppeteer/dashboard
          file: puppeteer/dashboard/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (docs)
        id: meta-docs
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/axiom-laboratories/axiom-docs
          flavor: |
            latest=auto
          tags: |
            type=ref,event=tag

      - name: Build and push docs image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docs/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-docs.outputs.tags }}
          labels: ${{ steps.meta-docs.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (node)
        id: meta-node
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/axiom-laboratories/axiom-node
          flavor: |
            latest=auto
          tags: |
            type=ref,event=tag

      - name: Build and push node image
        uses: docker/build-push-action@v6
        with:
          context: puppets
          file: puppets/Containerfile.node
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-node.outputs.tags }}
          labels: ${{ steps.meta-node.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
