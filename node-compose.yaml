
version: "3"
services:
  node:
    image: localhost/master-of-puppets-node:latest
    environment:
      - AGENT_URL=https://host.containers.internal:8001
      - JOIN_
      - ROOT_CA_PATH=/app/secrets/root_ca.crt
      - PYTHONUNBUFFERED=1
      - MOUNT_TEST_LOCAL=/mnt/c/Development/Repos/master_of_puppets/test_mount
    volumes:
      - vol_test_local:/mnt/c/Development/Repos/master_of_puppets/test_mount
    restart: always

volumes:
  vol_test_local:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/c/Development/Repos/master_of_puppets/test_mount"

