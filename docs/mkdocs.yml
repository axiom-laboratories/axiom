site_name: Axiom
site_url: https://dev.master-of-puppets.work/docs/
theme:
  name: material
  logo: assets/logo.svg
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
extra_css:
  - stylesheets/extra.css

plugins:
  - search
  # privacy + offline: required for air-gap / offline operation (INFRA-06) — do not remove
  - privacy
  - offline
  - swagger-ui-tag

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - tables

nav:
  - Home: index.md
  - Getting Started:
    - Prerequisites: getting-started/prerequisites.md
    - Install: getting-started/install.md
    - Running with Docker: getting-started/docker-deployment.md
    - Enroll a Node: getting-started/enroll-node.md
    - First Job: getting-started/first-job.md
  - Feature Guides:
    - Operator Tools:
      - axiom-push CLI: feature-guides/axiom-push.md
    - Platform Config:
      - Foundry: feature-guides/foundry.md
      - Job Scheduling: feature-guides/job-scheduling.md
      - RBAC: feature-guides/rbac.md
      - OAuth & Authentication: feature-guides/oauth.md
    - Reference:
      - RBAC Permission Reference: feature-guides/rbac-reference.md
    - Licensing: licensing.md
  - Security:
    - Overview: security/index.md
    - mTLS & Certificates: security/mtls.md
    - RBAC Hardening: security/rbac-hardening.md
    - Audit Log: security/audit-log.md
    - Air-Gap Operation: security/air-gap.md
  - Runbooks:
    - Overview: runbooks/index.md
    - Node Troubleshooting: runbooks/nodes.md
    - Job Execution: runbooks/jobs.md
    - Foundry: runbooks/foundry.md
    - FAQ: runbooks/faq.md
  - Developer:
    - Architecture: developer/architecture.md
    - Setup & Deployment: developer/setup-deployment.md
    - Contributing: developer/contributing.md
  - API Reference:
    - Overview: api-reference/index.md
